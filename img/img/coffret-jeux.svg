<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F3F8"/>
      <stop offset="100%" style="stop-color:#E4E0EC"/>
    </linearGradient>
    <linearGradient id="leather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4A3D"/>
      <stop offset="100%" style="stop-color:#3D2E22"/>
    </linearGradient>
    <linearGradient id="leather-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6A5A"/>
      <stop offset="100%" style="stop-color:#3A5A4A"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAF8"/>
      <stop offset="100%" style="stop-color:#E8E2D9"/>
    </linearGradient>
    <linearGradient id="card-back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D3D"/>
      <stop offset="100%" style="stop-color:#4A4A5D"/>
    </linearGradient>
    <linearGradient id="notebook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5D4F"/>
      <stop offset="100%" style="stop-color:#4A3F33"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B87C"/>
      <stop offset="100%" style="stop-color:#B09050"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/></filter>
    <filter id="sm"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <circle cx="470" cy="110" r="160" fill="#DDD8E8" opacity="0.35"/>
  <circle cx="120" cy="400" r="130" fill="#D0C8D8" opacity="0.2"/>

  <!-- Backgammon board (open) -->
  <g filter="url(#shadow)" transform="translate(50, 140)">
    <!-- Left panel -->
    <rect x="0" y="0" width="240" height="300" rx="6" fill="url(#leather)"/>
    <rect x="10" y="10" width="220" height="280" rx="4" fill="url(#leather-inner)"/>
    <!-- Right panel -->
    <rect x="260" y="0" width="240" height="300" rx="6" fill="url(#leather)"/>
    <rect x="270" y="10" width="220" height="280" rx="4" fill="url(#leather-inner)"/>
    <!-- Hinge -->
    <rect x="240" y="20" width="20" height="260" fill="#4A3A2E"/>

    <!-- Triangles - left panel -->
    <g opacity="0.6">
      <polygon points="25,15 55,15 40,100" fill="#E8E2D9"/>
      <polygon points="60,15 90,15 75,100" fill="#C4A870"/>
      <polygon points="95,15 125,15 110,100" fill="#E8E2D9"/>
      <polygon points="130,15 160,15 145,100" fill="#C4A870"/>
      <polygon points="165,15 195,15 180,100" fill="#E8E2D9"/>
      <polygon points="200,15 230,15 215,100" fill="#C4A870"/>
      <!-- Bottom triangles -->
      <polygon points="25,285 55,285 40,200" fill="#C4A870"/>
      <polygon points="60,285 90,285 75,200" fill="#E8E2D9"/>
      <polygon points="95,285 125,285 110,200" fill="#C4A870"/>
      <polygon points="130,285 160,285 145,200" fill="#E8E2D9"/>
      <polygon points="165,285 195,285 180,200" fill="#C4A870"/>
      <polygon points="200,285 230,285 215,200" fill="#E8E2D9"/>
    </g>
    <!-- Right panel triangles -->
    <g opacity="0.6">
      <polygon points="285,15 315,15 300,100" fill="#C4A870"/>
      <polygon points="320,15 350,15 335,100" fill="#E8E2D9"/>
      <polygon points="355,15 385,15 370,100" fill="#C4A870"/>
      <polygon points="390,15 420,15 405,100" fill="#E8E2D9"/>
      <polygon points="425,15 455,15 440,100" fill="#C4A870"/>
      <polygon points="460,15 490,15 475,100" fill="#E8E2D9"/>
    </g>

    <!-- Pieces -->
    <circle cx="40" cy="40" r="12" fill="#E8E2D9" stroke="#D5CEC0" stroke-width="0.5"/>
    <circle cx="40" cy="65" r="12" fill="#E8E2D9" stroke="#D5CEC0" stroke-width="0.5"/>
    <circle cx="110" cy="40" r="12" fill="#2C2821" stroke="#4A3F33" stroke-width="0.5"/>
    <circle cx="110" cy="65" r="12" fill="#2C2821" stroke="#4A3F33" stroke-width="0.5"/>
    <circle cx="300" cy="250" r="12" fill="#E8E2D9" stroke="#D5CEC0" stroke-width="0.5"/>
    <circle cx="370" cy="250" r="12" fill="#2C2821" stroke="#4A3F33" stroke-width="0.5"/>
    <circle cx="370" cy="270" r="12" fill="#2C2821" stroke="#4A3F33" stroke-width="0.5"/>

    <!-- Dice -->
    <g transform="translate(340, 130)">
      <rect x="0" y="0" width="28" height="28" rx="4" fill="url(#brass)"/>
      <circle cx="8" cy="8" r="2.5" fill="#3A2A1A"/>
      <circle cx="20" cy="8" r="2.5" fill="#3A2A1A"/>
      <circle cx="14" cy="14" r="2.5" fill="#3A2A1A"/>
      <circle cx="8" cy="20" r="2.5" fill="#3A2A1A"/>
      <circle cx="20" cy="20" r="2.5" fill="#3A2A1A"/>
    </g>
    <g transform="translate(375, 140)">
      <rect x="0" y="0" width="26" height="26" rx="4" fill="url(#brass)"/>
      <circle cx="7" cy="13" r="2.5" fill="#3A2A1A"/>
      <circle cx="19" cy="13" r="2.5" fill="#3A2A1A"/>
    </g>

    <!-- Logo clasp -->
    <rect x="230" y="140" width="40" height="20" rx="3" fill="url(#brass)"/>
    <text x="250" y="153" text-anchor="middle" font-family="Georgia" font-size="6" fill="#5A4020" letter-spacing="1">B</text>
  </g>

  <!-- Playing cards -->
  <g filter="url(#sm)" transform="translate(420, 50)">
    <!-- Card stack back -->
    <rect x="6" y="6" width="100" height="140" rx="4" fill="url(#card-back)" transform="rotate(5, 56, 76)"/>
    <rect x="3" y="3" width="100" height="140" rx="4" fill="url(#card-back)" transform="rotate(2, 53, 73)"/>
    <!-- Front card -->
    <rect x="0" y="0" width="100" height="140" rx="4" fill="url(#card)" stroke="#E0D8CE" stroke-width="0.5"/>
    <!-- Pattern on back visible card -->
    <rect x="9" y="9" width="82" height="122" rx="2" fill="none" stroke="url(#card-back)" stroke-width="0.5"/>
    <text x="50" y="70" text-anchor="middle" font-family="Georgia" font-size="10" fill="#4A4A5D" letter-spacing="3">MAISON B</text>
    <text x="50" y="85" text-anchor="middle" font-family="Georgia" font-size="7" fill="#7A7A9E" letter-spacing="1">PARIS</text>
    <!-- Corner markings -->
    <text x="15" y="28" font-family="Georgia" font-size="16" fill="#4A4A5D">A</text>
    <text x="15" y="38" font-family="Georgia" font-size="10" fill="#4A4A5D">♠</text>
  </g>

  <!-- Leather notebook -->
  <g filter="url(#sm)" transform="translate(440, 310)">
    <rect x="0" y="0" width="110" height="150" rx="5" fill="url(#notebook)"/>
    <rect x="6" y="6" width="98" height="138" rx="3" fill="#5D4F42"/>
    <!-- Stitching -->
    <rect x="12" y="12" width="86" height="126" rx="2" fill="none" stroke="#8A7A6A" stroke-width="0.5" stroke-dasharray="4,3"/>
    <!-- Logo emboss -->
    <text x="55" y="80" text-anchor="middle" font-family="Georgia" font-size="9" fill="#7A6A5A" letter-spacing="2" opacity="0.6">MAISON B</text>
    <!-- Elastic band -->
    <line x1="88" y1="0" x2="88" y2="150" stroke="#8A7050" stroke-width="2"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="30" cy="80" r="3" fill="#7A7A9E" opacity="0.2"/>
  <circle cx="45" cy="65" r="2" fill="#7A7A9E" opacity="0.15"/>
  <circle cx="570" cy="480" r="3" fill="#7A7A9E" opacity="0.2"/>
</svg>