<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBF6F0"/>
      <stop offset="100%" style="stop-color:#EDE4D8"/>
    </linearGradient>
    <linearGradient id="candle-jar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EBE3;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#FFF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#E0D5C8;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="wax" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8"/>
      <stop offset="100%" style="stop-color:#E8DFD4"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#E8A030"/>
      <stop offset="40%" style="stop-color:#F0C860"/>
      <stop offset="100%" style="stop-color:#FFF8E0"/>
    </linearGradient>
    <linearGradient id="diffuser" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D5C8B8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#B0A08A;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B87C"/>
      <stop offset="100%" style="stop-color:#B09050"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/></filter>
    <filter id="sm"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <circle cx="450" cy="130" r="170" fill="#F0E8DA" opacity="0.4"/>
  <circle cx="130" cy="380" r="120" fill="#E5DAC8" opacity="0.25"/>

  <!-- Large candle -->
  <g filter="url(#shadow)" transform="translate(120, 120)">
    <!-- Jar -->
    <rect x="0" y="30" width="140" height="200" rx="8" fill="url(#candle-jar)" stroke="#D5CEC0" stroke-width="0.5"/>
    <ellipse cx="70" cy="30" rx="70" ry="20" fill="url(#candle-jar)" stroke="#D5CEC0" stroke-width="0.5"/>
    <!-- Wax surface -->
    <ellipse cx="70" cy="35" rx="60" ry="16" fill="url(#wax)"/>
    <!-- Wick -->
    <line x1="70" y1="18" x2="70" y2="35" stroke="#4A4040" stroke-width="1.5"/>
    <!-- Flame -->
    <g filter="url(#glow)">
      <ellipse cx="70" cy="10" rx="6" ry="14" fill="url(#flame)" opacity="0.8"/>
      <ellipse cx="70" cy="8" rx="3" ry="8" fill="#FFF8E0" opacity="0.6"/>
    </g>
    <!-- Label -->
    <rect x="20" y="100" width="100" height="70" rx="3" fill="#E8E2D9"/>
    <text x="70" y="125" text-anchor="middle" font-family="Georgia" font-size="8" fill="#8C7851" letter-spacing="2">MAISON B</text>
    <text x="70" y="142" text-anchor="middle" font-family="Georgia" font-size="11" fill="#2C2821" letter-spacing="1">Bois de Santal</text>
    <text x="70" y="158" text-anchor="middle" font-family="Georgia" font-size="7" fill="#A0907A">300g — 55h</text>
    <!-- Shadow base -->
    <ellipse cx="70" cy="232" rx="65" ry="12" fill="#C4B5A0" opacity="0.2"/>
  </g>

  <!-- Diffuser -->
  <g filter="url(#shadow)" transform="translate(320, 90)">
    <!-- Bottle -->
    <rect x="30" y="80" width="80" height="180" rx="6" fill="url(#diffuser)" stroke="#C4B5A0" stroke-width="0.5"/>
    <rect x="48" y="30" width="44" height="55" rx="3" fill="url(#diffuser)" stroke="#C4B5A0" stroke-width="0.5"/>
    <!-- Brass cap -->
    <rect x="45" y="20" width="50" height="15" rx="3" fill="url(#brass)"/>
    <!-- Label -->
    <rect x="40" y="130" width="60" height="80" rx="2" fill="#F0EBE3"/>
    <text x="70" y="160" text-anchor="middle" font-family="Georgia" font-size="7" fill="#8C7851" letter-spacing="1">MAISON B</text>
    <text x="70" y="175" text-anchor="middle" font-family="Georgia" font-size="6" fill="#6B5D4F">DIFFUSEUR</text>
    <text x="70" y="195" text-anchor="middle" font-family="Georgia" font-size="6" fill="#A0907A">200ml</text>
    <!-- Sticks -->
    <line x1="55" y1="-40" x2="58" y2="25" stroke="#8A7050" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="65" y1="-50" x2="66" y2="25" stroke="#8A7050" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="75" y1="-45" x2="74" y2="25" stroke="#8A7050" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="85" y1="-35" x2="82" y2="25" stroke="#8A7050" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="-30" x2="54" y2="25" stroke="#8A7050" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Shadow base -->
    <ellipse cx="70" cy="262" rx="45" ry="8" fill="#C4B5A0" opacity="0.2"/>
  </g>

  <!-- Brass candle holder -->
  <g filter="url(#sm)" transform="translate(200, 370)">
    <ellipse cx="70" cy="60" rx="70" ry="14" fill="url(#brass)"/>
    <ellipse cx="70" cy="55" rx="65" ry="12" fill="#C4A870"/>
    <ellipse cx="70" cy="55" rx="50" ry="9" fill="#B09850" opacity="0.6"/>
    <!-- Inner circle -->
    <ellipse cx="70" cy="55" rx="30" ry="6" fill="#A08840" opacity="0.4"/>
    <!-- Engraved logo -->
    <text x="70" y="58" text-anchor="middle" font-family="Georgia" font-size="6" fill="#8A7040" letter-spacing="2" opacity="0.7">LOGO</text>
    <!-- Shadow -->
    <ellipse cx="70" cy="76" rx="65" ry="10" fill="#C4B5A0" opacity="0.15"/>
  </g>

  <!-- Matchbox -->
  <g filter="url(#sm)" transform="translate(430, 340)">
    <rect x="0" y="0" width="80" height="110" rx="3" fill="#2C2821"/>
    <rect x="4" y="4" width="72" height="102" rx="2" fill="#E8E2D9"/>
    <text x="40" y="50" text-anchor="middle" font-family="Georgia" font-size="7" fill="#6B5D4F" letter-spacing="1">MAISON B</text>
    <text x="40" y="65" text-anchor="middle" font-family="Georgia" font-size="10" fill="#2C2821" letter-spacing="1">allumettes</text>
    <rect x="15" y="40" width="50" height="0.5" fill="#C4A46C" opacity="0.3"/>
    <rect x="15" y="72" width="50" height="0.5" fill="#C4A46C" opacity="0.3"/>
    <!-- Match tips visible -->
    <circle cx="25" cy="88" r="3" fill="#C06030"/>
    <circle cx="35" cy="88" r="3" fill="#C06030"/>
    <circle cx="45" cy="88" r="3" fill="#C06030"/>
    <circle cx="55" cy="88" r="3" fill="#C06030"/>
  </g>

  <!-- Smoke wisps -->
  <g opacity="0.12">
    <path d="M190,100 Q195,70 185,40 Q180,10 190,-20" fill="none" stroke="#A09080" stroke-width="2"/>
    <path d="M195,105 Q205,65 195,30 Q190,-5 200,-30" fill="none" stroke="#A09080" stroke-width="1.5"/>
  </g>
</svg>