<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F8F2"/>
      <stop offset="100%" style="stop-color:#E4EBE0"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A08060"/>
      <stop offset="100%" style="stop-color:#7A6045"/>
    </linearGradient>
    <linearGradient id="ceramic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EBE3"/>
      <stop offset="30%" style="stop-color:#FFF"/>
      <stop offset="100%" style="stop-color:#E0D8CE"/>
    </linearGradient>
    <linearGradient id="tea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8BA88B;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#5A7A5A;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="tin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A6A4A"/>
      <stop offset="100%" style="stop-color:#3A5A3A"/>
    </linearGradient>
    <linearGradient id="biscuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D8B8"/>
      <stop offset="100%" style="stop-color:#D4C098"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.1"/></filter>
    <filter id="sm"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="600" height="500" fill="url(#bg)"/>
  <circle cx="480" cy="120" r="160" fill="#DAE5D5" opacity="0.4"/>
  <circle cx="100" cy="400" r="130" fill="#C8D8C0" opacity="0.25"/>

  <!-- Wood tray / plateau -->
  <g filter="url(#shadow)" transform="translate(80, 280)">
    <rect x="0" y="0" width="440" height="160" rx="10" fill="url(#wood)"/>
    <rect x="8" y="8" width="424" height="144" rx="7" fill="#8A6A48" opacity="0.7"/>
    <!-- Wood grain lines -->
    <line x1="20" y1="40" x2="420" y2="38" stroke="#9A7A58" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="80" x2="420" y2="82" stroke="#9A7A58" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="120" x2="420" y2="118" stroke="#9A7A58" stroke-width="0.5" opacity="0.3"/>
    <!-- Engraved logo -->
    <text x="220" y="90" text-anchor="middle" font-family="Georgia" font-size="12" fill="#7A5A38" letter-spacing="4" opacity="0.5">VOTRE LOGO</text>
  </g>

  <!-- Ceramic cup 1 -->
  <g filter="url(#sm)" transform="translate(120, 200)">
    <ellipse cx="55" cy="110" rx="50" ry="10" fill="#B0A890" opacity="0.2"/>
    <path d="M10,20 L18,100 L92,100 L100,20 Z" fill="url(#ceramic)" stroke="#D5CEC0" stroke-width="0.5"/>
    <ellipse cx="55" cy="20" rx="45" ry="14" fill="url(#ceramic)" stroke="#D5CEC0" stroke-width="0.5"/>
    <ellipse cx="55" cy="20" rx="38" ry="11" fill="#F8F5F0"/>
    <!-- Tea inside -->
    <ellipse cx="55" cy="22" rx="35" ry="9" fill="url(#tea)"/>
    <!-- Handle -->
    <path d="M100,40 Q130,45 128,65 Q126,85 100,82" fill="none" stroke="url(#ceramic)" stroke-width="8"/>
    <path d="M100,44 Q124,48 122,65 Q120,82 100,78" fill="none" stroke="#D5CEC0" stroke-width="0.5"/>
    <!-- Subtle decoration -->
    <line x1="20" y1="75" x2="90" y2="75" stroke="#8BA88B" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Ceramic cup 2 -->
  <g filter="url(#sm)" transform="translate(340, 220)">
    <ellipse cx="48" cy="95" rx="44" ry="9" fill="#B0A890" opacity="0.2"/>
    <path d="M8,18 L15,88 L81,88 L88,18 Z" fill="url(#ceramic)" stroke="#D5CEC0" stroke-width="0.5"/>
    <ellipse cx="48" cy="18" rx="40" ry="12" fill="url(#ceramic)" stroke="#D5CEC0" stroke-width="0.5"/>
    <ellipse cx="48" cy="18" rx="34" ry="9.5" fill="#F8F5F0"/>
    <ellipse cx="48" cy="20" rx="31" ry="8" fill="url(#tea)"/>
    <path d="M88,35 Q114,38 112,55 Q110,72 88,70" fill="none" stroke="url(#ceramic)" stroke-width="7"/>
    <line x1="16" y1="65" x2="80" y2="65" stroke="#8BA88B" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Tea tin box -->
  <g filter="url(#shadow)" transform="translate(240, 60)">
    <rect x="0" y="30" width="100" height="160" rx="6" fill="url(#tin)"/>
    <ellipse cx="50" cy="30" rx="50" ry="16" fill="#5A7A5A"/>
    <ellipse cx="50" cy="30" rx="50" ry="16" fill="none" stroke="#7A9A7A" stroke-width="0.5"/>
    <!-- Label -->
    <rect x="15" y="70" width="70" height="80" rx="3" fill="#E8E2D9"/>
    <text x="50" y="100" text-anchor="middle" font-family="Georgia" font-size="8" fill="#3A5A3A" letter-spacing="1">MAISON B</text>
    <text x="50" y="115" text-anchor="middle" font-family="Georgia" font-size="11" fill="#2C2821" letter-spacing="2">THÉ</text>
    <text x="50" y="132" text-anchor="middle" font-family="Georgia" font-size="6" fill="#8BA88B">COLLECTION</text>
    <rect x="20" y="85" width="60" height="0.5" fill="#C4A46C" opacity="0.4"/>
    <rect x="20" y="140" width="60" height="0.5" fill="#C4A46C" opacity="0.4"/>
  </g>

  <!-- Biscuits -->
  <g filter="url(#sm)" transform="translate(380, 120)">
    <rect x="0" y="0" width="120" height="90" rx="6" fill="#E8DFD4"/>
    <ellipse cx="30" cy="50" rx="20" ry="18" fill="url(#biscuit)"/>
    <ellipse cx="60" cy="45" rx="22" ry="16" fill="url(#biscuit)"/>
    <ellipse cx="90" cy="50" rx="18" ry="17" fill="url(#biscuit)"/>
    <!-- Little crumbs -->
    <circle cx="45" cy="38" r="3" fill="#D4C098" opacity="0.5"/>
    <circle cx="75" cy="55" r="2.5" fill="#D4C098" opacity="0.4"/>
  </g>

  <!-- Tea infuser / pince -->
  <g transform="translate(100, 100)">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#C4A46C" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="120" r="12" fill="none" stroke="#C4A46C" stroke-width="2"/>
    <circle cx="0" cy="120" r="6" fill="#C4A46C" opacity="0.3"/>
  </g>

  <!-- Decorative leaves -->
  <g transform="translate(500, 380)" opacity="0.2">
    <path d="M0,0 Q15,-30 0,-60 Q-15,-30 0,0 Z" fill="#6A8E6A"/>
    <line x1="0" y1="0" x2="0" y2="-58" stroke="#5A7A5A" stroke-width="0.5"/>
  </g>
  <g transform="translate(520, 370) rotate(30)" opacity="0.15">
    <path d="M0,0 Q12,-25 0,-50 Q-12,-25 0,0 Z" fill="#6A8E6A"/>
  </g>
</svg>